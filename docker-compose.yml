services:
  db:
    image: mysql:8.0
    container_name: inmo_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inmobiliaria_db
      MYSQL_USER: inmo_user
      MYSQL_PASSWORD: inmo_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: inmo_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=inmo_user
      - DB_PASSWORD=inmo_password
      - DB_NAME=inmobiliaria_db
      - JWT_SECRET=super_secret_jwt_key_ushuaia_2026
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
      - server_uploads:/app/uploads
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: inmo_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - server

volumes:
  db_data:
  server_uploads:
